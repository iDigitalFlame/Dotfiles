_: # Read Only

background:
  auto_change: 600
  directory: "${HOME}/Pictures/Backgrounds"
  enabled: true
  lockscreen: "${HOME}/.cache/smd/lockscreen.webp"
  method: "native"

display:
  auto: true

hydra:
  aliases:
    droid: "/opt/hydra/dij/Android/vm.conf"
    kali: "/opt/hydra/dij/Kali/vm.conf"
    win: "/opt/hydra/dij/Windows11/vm.conf"
    ws: "/opt/hydra/dij/WinStation/vm.conf"
  directory: "/opt/hydra/dij"

locker:
  ac:
    blank: 300
    cpu: "max"
    hibernate: false
    key: false
    lid: true
    lockscreen: 600
    suspend: 300
  battery:
    blank: 30
    cpu:
      efficiency: "power"
      governor: "powersave"
      max: "800Mhz"
      min: "400Mhz"
    hibernate: 180
    key: true
    lid: true
    lockscreen: 120
    suspend: 120
  lock_command: "${HOME}/.local/bin/sway/lock"

notify:
  default: "dialog-information.svg"
  icons:
  - "/usr/share/icons/kora/apps/scalable"
  show_errors: true
  theme: "/usr/share/icons/MoonlightSky/status/48"

session:
  freeze:
    enabled: true
    ignore:
    - "kitty"
    - "xlfreerdp"
    - "wlfreerdp"
    - "blueman-manager"
  startups:
  - "/usr/bin/nm-applet"
  - "${HOME}/.local/bin/mute --all"
  - "/usr/bin/aa-notify -p -f /run/log/audit/audit.log"
  triggers:
    bluetooth:
      enable:
      - "/usr/bin/blueman-manager"
  waybar: "bar"
