include                           ${HOME}/.config/theme/current/terminal.conf

term                              xterm-256color
editor                            "/usr/bin/nano"
force_ltr                         no
listen_on                         none
detect_urls                       yes
dim_opacity                       0
input_delay                       3
italic_font                       auto
pixel_scroll                      yes
forward_stdio                     no
open_url_with                     default
paste_actions                     quote-urls-at-prompt,confirm
repaint_delay                     15
click_interval                    -1.0
copy_on_select                    no
command_on_bell                   none
enabled_layouts                   stack
momentum_scroll                   0.75
mouse_hide_wait                   0
startup_session                   none
sync_to_monitor                   yes
undercurl_style                   thin-sparse
box_drawing_scale                 0.001, 1, 1.5, 2
disable_ligatures                 never
enable_audio_bell                 no
placement_strategy                center
focus_follows_mouse               yes
close_on_child_death              no
draw_minimal_borders              yes
linux_display_server              wayland
notify_on_cmd_finish              never
remember_window_size              no
visual_bell_duration              0.5
default_pointer_shape             beam
strip_trailing_spaces             smart
update_check_interval             0
show_hyperlink_targets            yes
confirm_os_window_close           0
hide_window_decorations           yes
inactive_tab_font_style           normal
touch_scroll_multiplier           1.0
select_by_word_characters         @-./_~?&=%+#
text_composition_strategy         platform
dynamic_background_opacity        no
text_fg_override_threshold        0

adjust_baseline                   0
adjust_line_height                0
adjust_column_width               0

allow_cloning                     no
allow_hyperlinks                  ask
allow_remote_control              no

active_tab_font_style             bold
active_tab_title_template         "{title}"

background_blur                   0
background_tint                   0
background_tint_gaps              0

bell_path                         none
bell_on_tab                       " "

bold_font                         auto
bold_italic_font                  auto

clear_all_shortcuts               yes
clear_all_mouse_actions           yes
clear_selection_on_clipboard_loss no

clipboard_control                 write-clipboard write-primary
clipboard_max_size                64

cursor_shape                      beam
cursor_trail                      0
cursor_beam_thickness             1.5
cursor_blink_interval             0
cursor_shape_unfocused            underline
cursor_stop_blinking_after        0
cursor_underline_thickness        2

font_size                         8.85
font_family                       Hack Nerd Font Mono
font_features                     FiraMono-Bold                +zero +onum
font_features                     FiraMono-Regular             +zero +onum
font_features                     FiraCodeNerdFont-Bold        +zero +onum
font_features                     FiraCodeNerdFont-Medium      +zero +onum
font_features                     FiraCodeNerdFont-Retina      +zero +onum
font_features                     FiraCodeNerdFont-Regular     +zero +onum
font_features                     FiraCodeNerdFontMono-Bold    +zero +onum
font_features                     FiraCodeNerdFontMono-Medium  +zero +onum
font_features                     FiraCodeNerdFontMono-Retina  +zero +onum
font_features                     FiraCodeNerdFontMono-Regular +zero +onum

initial_window_width              640
initial_window_height             400

pointer_shape_when_grabbed        arrow
pointer_shape_when_dragging       beam

resize_in_steps                   no
resize_debounce_time              0.25

scrollback_lines                  5000
scrollback_pager                  less --ignore-case --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size     2000
scrollback_fill_enlarged_window   yes

scrollbar                         scrolled
scrollbar_gap                     0.1
scrollbar_width                   0.5
scrollbar_radius                  0.3
scrollbar_hover_width             1
scrollbar_interactive             yes
scrollbar_jump_on_click           yes
scrollbar_track_opacity           0.25
scrollbar_handle_opacity          0.75
scrollbar_hitbox_expansion        0.25
scrollbar_min_handle_height       1

shell                             "/usr/bin/zsh"
shell_integration                 no-cursor no-rc no-sudo

single_window_margin_width        0
single_window_padding_width       0.5

tab_bar_edge                      bottom
tab_bar_align                     left
tab_bar_style                     powerline
tab_bar_min_tabs                  2
tab_bar_background                none
tab_title_template                "{title}"
tab_activity_symbol               "*"
tab_powerline_style               slanted
tab_switch_strategy               previous
tab_bar_margin_color              none
tab_bar_margin_width              0
tab_title_max_length              0
tab_bar_margin_height             0 0

underline_exclusion               1
underline_hyperlinks              always

url_style                         dotted
url_prefixes                      file git http https
url_excluded_characters           none

wayland_enable_ime                no
wayland_titlebar_color            background

wheel_scroll_min_lines            1
wheel_scroll_multiplier           5.0

window_logo_path                  none
window_logo_alpha                 0.4
window_border_width               0
window_margin_width               0
window_alert_on_bell              yes
window_logo_position              center
window_padding_width              0.5
window_resize_step_cells          2
window_resize_step_lines          2

# Copy / Paste
map                               ctrl+c               copy_and_clear_or_interrupt
map                               ctrl+v               paste_from_clipboard
map                               ctrl+shift+c         copy_to_clipboard
map                               ctrl+shift+v         paste_from_clipboard

# Scrolling
map                               ctrl+/               search_scrollback
map                               ctrl+up              scroll_to_prompt
map                               ctrl+end             scroll_end
map                               ctrl+down            scroll_prompt_to_bottom
map                               ctrl+home            scroll_home
map                               ctrl+space           scroll_prompt_to_top
map                               ctrl+shift+s         show_scrollback

# Window Management
map                               ctrl+n               new_os_window
map                               ctrl+p               detach_window ask
map                               ctrl+shift+w         close_os_window

# Tab Management
map                               ctrl+e               close_tab
map                               ctrl+t               new_tab
map                               ctrl+enter           new_tab
map                               shift+left           previous_tab
map                               shift+right          next_tab
map                               ctrl+shift+.         move_tab_forward
map                               ctrl+shift+,         move_tab_backward
map                               ctrl+shift+backspace set_tab_title

# Font Sizes
map                               ctrl+shift+\         change_font_size current 0
map                               ctrl+shift+|         change_font_size current 0
map                               ctrl+shift+=         change_font_size current +1.0
map                               ctrl+shift++         change_font_size current +1.0
map                               ctrl+shift+-         change_font_size current -1.0
map                               ctrl+shift+_         change_font_size current -1.0

# Marks
map                               ctrl+m               create_marker

# Miscellaneous
map                               ctrl+shift+f5        load_config_file

mouse_map                         left       click       grabbed,ungrabbed no-op
mouse_map                         left       press       ungrabbed         mouse_selection normal
mouse_map                         left       doubleclick ungrabbed         mouse_selection word
mouse_map                         left       doublepress ungrabbed         mouse_selection word
mouse_map                         left       triplepress ungrabbed         mouse_selection line

mouse_map                         right      click       ungrabbed         mouse_selection extend
mouse_map                         right      press       ungrabbed         mouse_selection extend

mouse_map                         middle     click       grabbed,ungrabbed no-op
mouse_map                         middle     press       grabbed,ungrabbed no-op
mouse_map                         middle     release     grabbed,ungrabbed no-op

mouse_map                         shift+left click       grabbed,ungrabbed mouse_click_url_or_select
mouse_map                         shift+left press       grabbed,ungrabbed mouse_click_url_or_select
