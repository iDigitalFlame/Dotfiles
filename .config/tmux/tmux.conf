# Server
set-option -g backspace                      C-?
set-option -g buffer-limit                   64
set-option -g copy-command                   "/usr/bin/wl-copy --trim-newline"
set-option -g default-client-command         "new-session"
set-option -g default-terminal               "tmux-256color"
set-option -g editor                         "/usr/bin/nano -SLlwxiE --tabsize=4"
set-option -g escape-time                    10
set-option -g exit-empty                     on
set-option -g exit-unattached                off
set-option -g extended-keys                  off
set-option -g extended-keys-format           "xterm"
set-option -g focus-events                   off
set-option -g history-file                   ""
set-option -g input-buffer-size              1048576
set-option -g message-limit                  128
set-option -g prompt-history-limit           128
set-option -g set-clipboard                  "external"
set-option -g variation-selector-always-wide on

# Session
set-option -g activity-action             "current"
set-option -g assume-paste-time           1
set-option -g base-index                  0
set-option -g bell-action                 "current"
set-option -g default-command             "/usr/bin/zsh"
set-option -g default-shell               "/usr/bin/zsh"
set-option -g default-size                100x40
set-option -g destroy-unattached          off
set-option -g detach-on-destroy           on
set-option -g display-panes-active-colour "purple"
set-option -g display-panes-colour        "white"
set-option -g display-panes-time          2000
set-option -g display-time                1000
set-option -g history-limit               5000
set-option -g initial-repeat-time         0
set-option -g key-table                   "root"
set-option -g lock-after-time             0
set-option -g lock-command                ""
set-option -g menu-border-lines           "heavy"
set-option -g menu-border-style           fg=white
set-option -g menu-selected-style         fg=white,bg=cyan,bold
set-option -g menu-style                  fg=white
set-option -g message-command-style       fg=black,bg=white
set-option -g message-line                0
set-option -g message-style               fg=white,bg=red,bold
set-option -g mouse                       on
set-option -g prefix                      C-a
set-option -g prefix-timeout              0
set-option -g prefix2                     C-b
set-option -g prompt-cursor-colour        "#34DEF9"
set-option -g prompt-cursor-style         "default"
set-option -g renumber-windows            on
set-option -g repeat-time                 500
set-option -g set-titles                  off
set-option -g silence-action              "none"
set-option -g status                      on
set-option -g status-bg                   "purple"
set-option -g status-fg                   "white"
set-option -g status-interval             0
set-option -g status-justify              "left"
set-option -g status-keys                 "vi"
set-option -g status-left                 "#{session_name}: "
set-option -g status-left-length          32
set-option -g status-left-style           fg=white,bg=purple,bold
set-option -g status-position             "bottom"
set-option -g status-right                ""
set-option -g status-right-length         10
set-option -g status-right-style          fg=white,bg=purple
set-option -g update-environment          "SSH_AUTH_SOCK SSH_CLIENT SSH_USER_AUTH"
set-option -g visual-activity             off
set-option -g visual-bell                 on
set-option -g visual-silence              off
set-option -g word-separators             "!\"#set-option -g %&'()*+,-./:;<=>?@[\]^`{|}~"

# Window
set-option -g aggressive-resize            off
set-option -g automatic-rename             on
set-option -g clock-mode-colour            "#7D0BAB"
set-option -g clock-mode-style             24
set-option -g copy-mode-mark-style         fg=black,bg=cyan
set-option -g copy-mode-match-style        fg=black,bg=green
set-option -g copy-mode-position-style     fg=white
set-option -g copy-mode-selection-style    bg=purple
set-option -g fill-character               ""
set-option -g main-pane-height             40
set-option -g main-pane-width              100
set-option -g mode-style                   fg=black,bg=cyan
set-option -g monitor-activity             off
set-option -g monitor-bell                 on
set-option -g monitor-silence              0
set-option -g other-pane-height            40
set-option -g other-pane-width             100
set-option -g pane-base-index              0
set-option -g pane-border-indicators       "both"
set-option -g pane-border-lines            "heavy"
set-option -g pane-border-status           off
set-option -g pane-border-style            fg=white
set-option -g pane-scrollbars              "modal"
set-option -g pane-scrollbars-position     "right"
set-option -g pane-scrollbars-style        fg=white
set-option -g pane-status-current-style    "default"
set-option -g pane-status-current-style    "default"
set-option -g pane-status-style            "default"
set-option -g popup-border-lines           "heavy"
set-option -g popup-border-style           fg=white
set-option -g popup-style                  "default"
set-option -g session-status-style         "default"
set-option -g window-active-style          "default"
set-option -g window-size                  "latest"
set-option -g window-status-activity-style bg=cyan,bold
set-option -g window-status-bell-style     bg=cyan,bold
set-option -g window-status-current-format "#{window_index}:#{?#{n:window_name},#{window_name},#{pane_current_command}}:$#{pane_pid}"
set-option -g window-status-current-style  fg=black,bg=white
set-option -g window-status-format         "#{window_index}:#{?#{n:window_name},#{window_name},#{pane_current_command}}"
set-option -g window-status-last-style     "default"
set-option -g window-status-separator      " "
set-option -g window-status-style          fg=white,bg=black
set-option -g window-style                 "default"
set-option -g wrap-search                  on

# Pane
set-option -g allow-passthrough off
set-option -g allow-rename      off
set-option -g allow-set-title   off
set-option -g alternate-screen  off
set-option -g cursor-colour     "#34DEF9"
set-option -g cursor-style      bar
set-option -g remain-on-exit    off
set-option -g scroll-on-clear   on
set-option -g synchronize-panes off
set-option -g window-style      "default"

# Unbind All Keys
unbind-key -a

bind-key C-a send-prefix
bind-key C-b send-prefix

bind-key 1 select-window -t :1
bind-key 2 select-window -t :2
bind-key 3 select-window -t :3
bind-key 4 select-window -t :4
bind-key 5 select-window -t :5
bind-key 6 select-window -t :6
bind-key 7 select-window -t :7
bind-key 8 select-window -t :8
bind-key 9 select-window -t :9
bind-key 0 select-window -t :0

bind-key ? list-keys
bind-key [ previous-window
bind-key ] next-window
bind-key a new-window
bind-key c source-file     "${HOME}/.config/tmux/tmux.conf" \; display "Config Reloaded!"
bind-key d detach-client
bind-key f command-prompt "find-window '%%'"
bind-key h split-window   -h
bind-key i command-prompt -p index "select-window -t ':%%'"
bind-key j split-window   -v
bind-key l command-prompt -p index "select-pane -t ':%%'"
bind-key m select-pane    -l
bind-key n new-window
bind-key p last-window
bind-key q kill-window
bind-key r command-prompt -I \#S "rename-session '%%'"
bind-key t command-prompt -I \#W "rename-window '%%'"
bind-key v clock-mode
bind-key w choose-window
bind-key x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind-key y choose-tree    -O index
bind-key z new-window

bind-key tab    display-panes
bind-key left   previous-window
bind-key right  next-window
bind-key escape command-prompt
